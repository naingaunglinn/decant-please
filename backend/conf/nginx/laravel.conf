# Included inside Heroku's default heroku-php-nginx `server { }` via `-C` (see Procfile).
#
# Fragrance image uploads run ~2 MB; keep the proxy body limit above that so they
# reach PHP instead of 413-ing at nginx (PHP's own cap is raised in public/.user.ini).
client_max_body_size 10m;

# Laravel front controller. Heroku's default nginx serves real files and `/` only,
# so every framework route (/api/v1/*, /up, /admin) 404s without this rewrite. The
# default config defines no `location /`, so adding one here doesn't collide.
location / {
    try_files $uri $uri/ /index.php?$query_string;
}
