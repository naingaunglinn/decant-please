; Fragrance images run ~2 MB, which is exactly where PHP's default
; upload_max_filesize (2M) starts rejecting them — the same reason the old
; bare-VPS Nginx block raised client_max_body_size to 5m. On Heroku the upload
; transits php-fpm, which reads this per-directory .user.ini automatically, so
; raise the PHP layer's headroom here.
;
; Read only by php-fpm/FastCGI (i.e. on Heroku). A no-op under local
; `php artisan serve` / `php -S`, which don't use php-fpm — so it changes
; nothing about local dev. If an upload still 413s, that's Nginx's
; client_max_body_size, not this — see DEPLOY.md "Image upload size".
upload_max_filesize = 8M
post_max_size = 10M
