# One-terminal dev runner: `docker compose up` = Postgres + Laravel API (:8010) + Next.js (:3001).
# 3001 not 3000/3010: those are held by other local projects that run in parallel.
# Zero local prerequisites: a fresh clone bootstraps itself on first `up` —
# backend/docker/dev-entrypoint.sh installs deps, creates .env, migrates, seeds.
services:
  postgres:
    # 17 to match the major version Heroku defaults new databases to — the host has
    # no first-party MySQL, which is why this project isn't on MySQL any more.
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: decant_please
      POSTGRES_USER: postgres # set explicitly rather than leaning on the image default
    ports:
      # 5442 on the host, not 5432: another project on this dev machine already
      # publishes Postgres there, the same reason the API is 8010 and the storefront
      # 3001 (CLAUDE.md §7). Inside the compose network it's still a plain 5432.
      - "5442:5432"
    volumes:
      - decant_postgres_data:/var/lib/postgresql/data
    healthcheck:
      # a real query, not `pg_isready` (which answers before the database is usable);
      # -h127.0.0.1 forces TCP — first-boot init runs a temp server with
      # listen_addresses='' that must not count as "ready". PGPASSWORD is required
      # precisely because that TCP path authenticates, where the local socket is trust.
      test: ["CMD-SHELL", "PGPASSWORD=secret psql -h127.0.0.1 -U postgres -d decant_please -c 'SELECT 1'"]
      interval: 2s
      timeout: 5s
      retries: 60

  backend:
    build: ./backend
    # no `user:` pin — runs as root, which is the only thing that can write the
    # checkout wherever it lives (your home dir, or a root-owned /var/www) and keeps
    # `docker compose exec` consistent with the server process. Pinning a uid instead
    # only works where that guess matches the checkout's owner. Cost: vendor/ and
    # node_modules/ come out root-owned on the host; the .env files are handed back.
    working_dir: /var/www/decant-please/backend
    volumes:
      # same path as on the host so absolute paths/symlinks made by artisan work on both sides
      - ./backend:/var/www/decant-please/backend
    environment:
      HOME: /tmp # composer needs a writable home
      # the whole DB_* block is pinned to the compose postgres service (real env beats
      # .env in Laravel), so `up` works with a fresh auto-copied .env or one
      # hand-tuned for a host Postgres — nothing else in .env is overridden.
      # DB_CONNECTION included deliberately: a .env predating the Postgres switch still
      # says mysql, and without this pin Laravel drives a Postgres server with the MySQL
      # driver and just times out looking unreachable.
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: decant_please
      DB_USERNAME: postgres # Postgres's default superuser is postgres, not root
      DB_PASSWORD: secret
    depends_on:
      postgres:
        condition: service_healthy # first boot: wait out Postgres's initialization
    ports:
      - "8010:8010"
      - "3001:3001" # the frontend's port — it shares this network namespace (see below)
    # first-run bootstrap (.env, composer install, APP_KEY, storage link, migrate,
    # seed) + the dev server — see the script for why it's php -S, not artisan serve
    command: sh docker/dev-entrypoint.sh

  frontend:
    image: node:24
    # share the backend's network namespace so server-side fetches to
    # NEXT_PUBLIC_API_URL=http://localhost:8010 work unchanged — no internal/external
    # URL split, no app code touched. Give it its own network if that ever hurts.
    network_mode: service:backend
    working_dir: /var/www/decant-please/frontend
    volumes:
      - ./frontend:/var/www/decant-please/frontend
    environment:
      HOME: /tmp # npm needs a writable home
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1" # fresh npm installs shouldn't pull ~400MB of test browsers
    # .env.local + npm install + the dev server — no `user:` pin, same as the backend
    command: sh docker/dev-entrypoint.sh

volumes:
  decant_postgres_data:
    # a new volume, not a rename of decant_mysql_data — Postgres can't read MySQL's
    # files. Your old dev data isn't deleted, just no longer used; the next `up`
    # migrates and seeds a fresh database.
    name: decant_postgres_data
