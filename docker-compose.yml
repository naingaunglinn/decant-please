# One-terminal dev runner: `docker compose up` = MySQL + Laravel API (:8010) + Next.js (:3001).
# 3001 not 3000/3010: those are held by other local projects that run in parallel.
# Zero local prerequisites: a fresh clone bootstraps itself on first `up` —
# backend/docker/dev-entrypoint.sh installs deps, creates .env, migrates, seeds.
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: decant_please
    ports:
      - "3306:3306"
    volumes:
      - decant_mysql_data:/var/lib/mysql
    healthcheck:
      # a real query, not `mysqladmin ping` (which can report alive before auth works);
      # -h127.0.0.1 forces TCP — first-boot initialization runs a socket-only temp
      # server that must not count as "ready"
      test: ["CMD", "mysql", "-h127.0.0.1", "-uroot", "-psecret", "-e", "SELECT 1"]
      interval: 2s
      timeout: 5s
      retries: 60

  backend:
    build: ./backend
    user: "1000:1000" # host uid — vendor/ and storage/ writes stay owned by you
    working_dir: /var/www/decant-please/backend
    volumes:
      # same path as on the host so absolute paths/symlinks made by artisan work on both sides
      - ./backend:/var/www/decant-please/backend
    environment:
      HOME: /tmp # composer needs a writable home
      # the whole DB_* block is pinned to the compose mysql service (real env beats
      # .env in Laravel), so `up` works with a fresh auto-copied .env or one
      # hand-tuned for a host MySQL — nothing else in .env is overridden
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: decant_please
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy # first boot: wait out MySQL's initialization
    ports:
      - "8010:8010"
      - "3001:3001" # the frontend's port — it shares this network namespace (see below)
    # first-run bootstrap (.env, composer install, APP_KEY, storage link, migrate,
    # seed) + the dev server — see the script for why it's php -S, not artisan serve
    command: sh docker/dev-entrypoint.sh

  frontend:
    image: node:24
    # ponytail: share the backend's network namespace so server-side fetches to
    # NEXT_PUBLIC_API_URL=http://localhost:8010 work unchanged — no internal/external
    # URL split, no app code touched. Give it its own network if that ever hurts.
    network_mode: service:backend
    user: node
    working_dir: /var/www/decant-please/frontend
    volumes:
      - ./frontend:/var/www/decant-please/frontend
    environment:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1" # fresh npm installs shouldn't pull ~400MB of test browsers
    # .env.local is optional (the code falls back to these same localhost URLs) —
    # the copy just keeps parity with the documented manual setup
    command: sh -c '[ -f .env.local ] || cp .env.local.example .env.local; npm install && npm run dev -- -p 3001'

volumes:
  decant_mysql_data:
    name: decant_mysql_data # reuse the volume from the README's `docker run` — existing data carries over
